services:
  dengar:
    build: .
    image: dengar:latest
    ports:
      # Localhost only — expose publicly via host nginx (Wooby uses 8080).
      - "127.0.0.1:8081:8081"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "8081"
      HOSTNAME: "0.0.0.0"
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8081/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
