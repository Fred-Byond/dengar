name: Deploy

# Auto-deploy on every push to main; also runnable manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Repo secrets required:
#   DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH, NEXT_PUBLIC_KLLEON_SDK_KEY
# Optional:
#   DEPLOY_PORT (default 22)
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          NEXT_PUBLIC_KLLEON_SDK_KEY: ${{ secrets.NEXT_PUBLIC_KLLEON_SDK_KEY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          # Cold npm ci + next build regularly exceeds the default 10m.
          command_timeout: 30m
          envs: NEXT_PUBLIC_KLLEON_SDK_KEY
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            # Runtime env for compose (never commit .env).
            # Write both names: KLLEON_SDK_KEY is read at runtime (not inlined
            # at next build); NEXT_PUBLIC_* kept for local-dev compatibility.
            umask 077
            printf '%s\n' \
              "KLLEON_SDK_KEY=${NEXT_PUBLIC_KLLEON_SDK_KEY}" \
              "NEXT_PUBLIC_KLLEON_SDK_KEY=${NEXT_PUBLIC_KLLEON_SDK_KEY}" \
              'PORT=8081' > .env

            # Keep BuildKit layer cache (npm ci / next build) so deploys finish
            # under timeout. Only drop dangling images after recreate.
            docker compose up -d --build --force-recreate
            docker image prune -f
