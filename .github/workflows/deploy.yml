name: Deploy

# Build the image on GitHub (plenty of RAM), then ship it to the VPS.
# Building Next.js on a small server OOMs / thrashing-swaps and hangs.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Repo secrets required:
#   DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH, NEXT_PUBLIC_KLLEON_SDK_KEY
# Optional:
#   DEPLOY_PORT (default 22)
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image on runner
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: dengar:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image archive
        run: docker save dengar:latest | gzip -1 > dengar.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: dengar.tar.gz
          target: /tmp/

      - name: Load image and restart
        uses: appleboy/ssh-action@v1.2.0
        env:
          NEXT_PUBLIC_KLLEON_SDK_KEY: ${{ secrets.NEXT_PUBLIC_KLLEON_SDK_KEY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 15m
          envs: NEXT_PUBLIC_KLLEON_SDK_KEY
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            umask 077
            printf '%s\n' \
              "KLLEON_SDK_KEY=${NEXT_PUBLIC_KLLEON_SDK_KEY}" \
              "NEXT_PUBLIC_KLLEON_SDK_KEY=${NEXT_PUBLIC_KLLEON_SDK_KEY}" \
              'PORT=8081' > .env

            gunzip -c /tmp/dengar.tar.gz | docker load
            rm -f /tmp/dengar.tar.gz

            # No --build: image was built on GitHub Actions.
            docker compose up -d --force-recreate --no-build
            docker image prune -f
